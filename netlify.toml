[[redirects]]
  from = "/neighborhoods.html"
  to = "/cities.html"
  status = 301
  force = true

[[redirects]]
  from = "/thank-you"
  to = "/index.html"
  status = 301
  force = true

[[redirects]]
  from = "/thank-you.html"
  to = "/index.html"
  status = 301
  force = true

# No SPA catch-all: this is a static multi-page site, so unknown paths
# must return a real 404 (Netlify auto-serves /404.html) instead of the
# homepage with a 200 — avoids soft-404s and duplicate-content noise.

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[build]
  publish = "."

[functions]
  included_files = ["data/**"]
